<!-- ===== طرح سبز شوفاژکار — بنر کوتاه گرافیکی ===== -->
<section class="ts" dir="rtl" lang="fa">
<style>
@import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700;900&display=swap');
.ts{
  position:relative;margin:32px auto;max-width:1100px;border-radius:28px;overflow:hidden;
  font-family:'Vazirmatn','IRANSans','Tahoma',sans-serif;
  box-shadow:0 24px 64px rgba(10,60,35,.30),0 0 0 1px rgba(32,201,151,.18);
}
/* پس‌زمینه چند‌لایه */
.ts-bg{
  position:absolute;inset:0;z-index:0;
  background:linear-gradient(130deg,#052e16 0%,#064e29 30%,#0a6640 60%,#0d7a4e 100%);
}
/* دایره‌های neon درخشنده */
.ts-glow{position:absolute;border-radius:50%;pointer-events:none;filter:blur(70px)}
.ts-glow.g1{width:320px;height:320px;background:#20c997;opacity:.18;top:-100px;left:-80px;animation:tsB1 9s ease-in-out infinite}
.ts-glow.g2{width:260px;height:260px;background:#4ade80;opacity:.14;bottom:-100px;right:80px;animation:tsB1 11s ease-in-out infinite reverse}
.ts-glow.g3{width:180px;height:180px;background:#fbbf24;opacity:.10;top:20px;left:45%;animation:tsB1 7s ease-in-out infinite 2s}
@keyframes tsB1{0%,100%{transform:scale(1) translate(0,0)}50%{transform:scale(1.25) translate(20px,-15px)}}

/* شبکه نقطه‌ای */
.ts-dots{
  position:absolute;inset:0;
  background-image:radial-gradient(rgba(255,255,255,.06) 1px,transparent 1px);
  background-size:28px 28px;
}

/* خطوط متحرک */
.ts-lines{position:absolute;inset:0;overflow:hidden}
.ts-lines span{
  position:absolute;display:block;width:1px;
  background:linear-gradient(to bottom,transparent,rgba(32,201,151,.4),transparent);
  animation:tsLine 4s ease-in-out infinite;
}
.ts-lines span:nth-child(1){left:15%;height:60%;top:20%;animation-delay:0s}
.ts-lines span:nth-child(2){left:35%;height:40%;top:30%;animation-delay:-1.3s}
.ts-lines span:nth-child(3){left:70%;height:55%;top:10%;animation-delay:-2.6s}
@keyframes tsLine{0%,100%{opacity:0;transform:scaleY(.3)}50%{opacity:1;transform:scaleY(1)}}

/* محتوا */
.ts-inner{
  position:relative;z-index:1;
  display:grid;grid-template-columns:1fr 200px;align-items:center;gap:20px;
  padding:32px 36px;
}
@media(max-width:740px){
  .ts-inner{grid-template-columns:1fr;padding:26px 22px;text-align:center}
  .ts-art-wrap{margin:0 auto}
  .ts-chips{justify-content:center}
}

/* تگ */
.ts-tag{
  display:inline-flex;align-items:center;gap:7px;
  padding:6px 14px;border-radius:999px;font-size:12px;font-weight:700;color:#fff;
  background:rgba(32,201,151,.22);border:1px solid rgba(32,201,151,.45);
  backdrop-filter:blur(8px);
  box-shadow:0 0 16px rgba(32,201,151,.25);
  animation:tsFadeIn .7s ease both;
}
.ts-tag .dot{width:7px;height:7px;border-radius:50%;background:#4ade80;animation:tsPulse 1.8s ease-in-out infinite}
@keyframes tsPulse{0%,100%{box-shadow:0 0 0 0 rgba(74,222,128,.6)}60%{box-shadow:0 0 0 7px rgba(74,222,128,0)}}

/* تیتر */
.ts h3{
  margin:10px 0 8px;font-weight:900;color:#fff;
  font-size:clamp(19px,2.2vw,25px);line-height:1.45;
  text-shadow:0 2px 18px rgba(0,0,0,.3);
  animation:tsFadeIn .8s ease .15s both;
}
.ts h3 em{font-style:normal;color:#4ade80}

/* توضیح */
.ts p{
  margin:0 0 16px;font-size:14px;line-height:2;
  color:rgba(255,255,255,.88);max-width:600px;
  animation:tsFadeIn .8s ease .25s both;
}

/* چیپ‌ها */
.ts-chips{
  display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px;
  animation:tsFadeIn .8s ease .35s both;
}
.ts-chip{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 13px;border-radius:999px;font-size:12.5px;font-weight:700;color:#fff;
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);
  transition:all .3s ease;cursor:default;
  backdrop-filter:blur(4px);
}
.ts-chip:hover{background:rgba(74,222,128,.25);border-color:rgba(74,222,128,.6);transform:translateY(-2px);box-shadow:0 6px 18px rgba(74,222,128,.2)}
.ts-chip .ci{width:15px;height:15px;flex-shrink:0}

/* دکمه */
.ts-btn{
  display:inline-flex;align-items:center;gap:9px;
  padding:12px 26px;border-radius:999px;font-size:14px;font-weight:800;color:#052e16;
  background:linear-gradient(90deg,#4ade80,#34d399);
  box-shadow:0 8px 28px rgba(74,222,128,.35);
  text-decoration:none;position:relative;overflow:hidden;
  transition:transform .3s ease,box-shadow .3s ease;
  animation:tsFadeIn .8s ease .45s both;
}
.ts-btn::before{
  content:"";position:absolute;inset:0;
  background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.35) 50%,transparent 100%);
  transform:translateX(-100%);transition:transform .6s ease;
}
.ts-btn:hover{transform:translateY(-3px) scale(1.04);box-shadow:0 14px 36px rgba(74,222,128,.5)}
.ts-btn:hover::before{transform:translateX(100%)}
.ts-btn svg{transition:transform .3s ease}
.ts-btn:hover svg{transform:translateX(-3px)}

@keyframes tsFadeIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* ===== SVG دیگ ===== */
.ts-art-wrap{width:170px;height:170px;flex-shrink:0;position:relative}
.ts-art-wrap svg{width:100%;height:100%}

/* حلقه دوار */
.ts-ring{transform-origin:80px 80px;animation:tsSpin 12s linear infinite}
@keyframes tsSpin{to{transform:rotate(360deg)}}

/* شعله */
.ts-flame{transform-origin:80px 95px;animation:tsFlame 1s ease-in-out infinite alternate}
@keyframes tsFlame{0%{transform:scaleY(1) scaleX(1)}100%{transform:scaleY(1.22) scaleX(.88)}}

/* نبض بدنه */
.ts-body-g{animation:tsBodyPulse 3s ease-in-out infinite}
@keyframes tsBodyPulse{0%,100%{filter:drop-shadow(0 0 6px rgba(74,222,128,.3))}50%{filter:drop-shadow(0 0 14px rgba(74,222,128,.6))}}

/* بخار */
.ts-steam1{animation:tsSteam1 2.5s ease-in-out infinite}
.ts-steam2{animation:tsSteam1 2.5s ease-in-out infinite .7s}
.ts-steam3{animation:tsSteam1 2.5s ease-in-out infinite 1.4s}
@keyframes tsSteam1{0%{opacity:0;transform:translateY(0) scale(.6)}30%{opacity:.65}100%{opacity:0;transform:translateY(-32px) scale(1.4)}}
</style>

<!-- پس‌زمینه -->
<div class="ts-bg">
  <div class="ts-glow g1"></div>
  <div class="ts-glow g2"></div>
  <div class="ts-glow g3"></div>
  <div class="ts-dots"></div>
  <div class="ts-lines"><span></span><span></span><span></span></div>
</div>

<div class="ts-inner">
  <!-- متن -->
  <div>
    <span class="ts-tag">
      <span class="dot"></span>
      طرح ویژه شوفاژکار
    </span>
    <h3>طرح سبز شوفاژکار؛<br>تعویض دیگ فرسوده، صرفه‌جویی تا <em>۶۰٪</em></h3>
    <p>دیگ فرسوده موتورخانه را با دیگ نسل جدید شوفاژکار جایگزین کنید — مصرف گاز کاهش می‌یابد، راندمان بالا می‌رود و گارانتی ۱۰ ساله همراهتان است.</p>
    <div class="ts-chips">
      <span class="ts-chip">
        <svg class="ci" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M13 2L3 14h7l-1 8 10-12h-7l1-8z"/></svg>
        صرفه‌جویی ۲۰–۶۰٪
      </span>
      <span class="ts-chip">
        <svg class="ci" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 2L4 6v6c0 5 3.5 9.5 8 10 4.5-.5 8-5 8-10V6l-8-4z"/></svg>
        گارانتی ۱۰ ساله
      </span>
      <span class="ts-chip">
        <svg class="ci" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
        اجرای سریع
      </span>
      <span class="ts-chip">
        <svg class="ci" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M3 7h18M3 12h18M3 17h18"/></svg>
        خدمات مادام‌العمر
      </span>
    </div>
    <a class="ts-btn" href="https://shofazh.com/chauffagekar-green-boiler.html">
      درخواست بازدید رایگان
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
    </a>
  </div>

  <!-- تصویر SVG دیگ -->
  <div class="ts-art-wrap">
    <svg viewBox="0 0 160 180" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="bGrad" cx="50%" cy="40%" r="60%">
          <stop offset="0%" stop-color="#d1fae5"/>
          <stop offset="100%" stop-color="#6ee7b7"/>
        </radialGradient>
        <linearGradient id="panelGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#0d2818"/>
          <stop offset="100%" stop-color="#041a0f"/>
        </linearGradient>
        <filter id="glow"><feGaussianBlur stdDeviation="2.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>

      <!-- حلقه دوار پیرامون -->
      <g class="ts-ring" opacity=".5">
        <circle cx="80" cy="80" r="72" fill="none" stroke="rgba(74,222,128,.3)" stroke-width="1.5" stroke-dasharray="8 6"/>
      </g>

      <!-- بخار -->
      <ellipse class="ts-steam1" cx="62" cy="32" rx="5" ry="7" fill="rgba(255,255,255,.25)"/>
      <ellipse class="ts-steam2" cx="80" cy="26" rx="6" ry="8" fill="rgba(255,255,255,.25)"/>
      <ellipse class="ts-steam3" cx="98" cy="32" rx="5" ry="7" fill="rgba(255,255,255,.25)"/>

      <!-- بدنه اصلی دیگ -->
      <g class="ts-body-g">
        <rect x="28" y="48" width="104" height="100" rx="16" fill="url(#bGrad)" stroke="#20c997" stroke-width="2"/>
        <!-- پانل جلو -->
        <rect x="38" y="58" width="84" height="52" rx="9" fill="url(#panelGrad)"/>
        <!-- چراغ‌های وضعیت -->
        <circle cx="55" cy="70" r="4" fill="#4ade80" filter="url(#glow)" opacity=".9"/>
        <circle cx="69" cy="70" r="4" fill="#fbbf24" opacity=".8"/>
        <circle cx="83" cy="70" r="3" fill="#4ade80" opacity=".6"/>
        <!-- خط جداکننده -->
        <line x1="42" y1="78" x2="118" y2="78" stroke="rgba(255,255,255,.08)" stroke-width="1"/>
        <!-- متن نمایشگر -->
        <rect x="44" y="83" width="72" height="20" rx="4" fill="#020d07"/>
        <text x="80" y="97" text-anchor="middle" fill="#4ade80" font-size="8.5" font-family="monospace" font-weight="bold">● ECO  96%</text>
      </g>

      <!-- شعله -->
      <g class="ts-flame" filter="url(#glow)">
        <path d="M80 98 C 64 80 70 60 80 44 C 92 60 98 80 80 98 Z" fill="#f59e0b" opacity=".9"/>
        <path d="M80 95 C 70 80 74 64 80 52 C 88 64 92 80 80 95 Z" fill="#f97316"/>
        <path d="M80 92 C 74 80 76 68 80 60 C 86 68 88 80 80 92 Z" fill="#fef3c7" opacity=".8"/>
      </g>

      <!-- لوله‌های طرفین -->
      <rect x="10" y="72" width="18" height="12" rx="4" fill="#0d7a4e"/>
      <circle cx="10" cy="78" r="7" fill="#20c997" stroke="#fff" stroke-width="1.2"/>
      <rect x="132" y="72" width="18" height="12" rx="4" fill="#0d7a4e"/>
      <circle cx="150" cy="78" r="7" fill="#20c997" stroke="#fff" stroke-width="1.2"/>

      <!-- پایه‌ها -->
      <rect x="40" y="148" width="18" height="22" rx="4" fill="#0d7a4e"/>
      <rect x="102" y="148" width="18" height="22" rx="4" fill="#0d7a4e"/>
      <rect x="34" y="168" width="30" height="6" rx="3" fill="#064e29"/>
      <rect x="96" y="168" width="30" height="6" rx="3" fill="#064e29"/>

      <!-- نشان سبز گوشه -->
      <circle cx="118" cy="52" r="16" fill="#052e16" stroke="#20c997" stroke-width="2"/>
      <path d="M108 52 C 108 44 114 40 121 42 C 122 48 118 54 108 52 Z" fill="#4ade80"/>
      <circle cx="118" cy="52" r="4" fill="#4ade80" opacity=".5"/>
    </svg>
  </div>
</div>
</section>
