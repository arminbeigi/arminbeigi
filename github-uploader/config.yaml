# ╔══════════════════════════════════════════════════╗
# ║   تنظیمات آپلود خودکار به سایت گیت‌هاب پیج    ║
# ╚══════════════════════════════════════════════════╝

# ── گیت‌هاب ──────────────────────────────────────
# ساخت توکن:
#   ۱. github.com/settings/tokens/new  رو باز کن
#   ۲. Note: هر اسمی بذار (مثلاً: uploader)
#   ۳. تیک "repo" رو بزن
#   ۴. Generate token → توکن رو اینجا کپی کن
github:
  token: "ghp_YOUR_TOKEN_HERE"
  owner: "arminbeigi"
  repo: "arminbeigi"
  branch: "gh-pages"
  dest_prefix: "brands"   # پوشه مقصد در سایت (خالی = ریشه سایت)

# ── پوشه نظارت روی مک ────────────────────────────
watch:
  folder: "~/Desktop/watch_folder"

# ── پوشه‌های برند (در اولین اجرا ساخته می‌شوند) ──
brands:
  - "جی پلاس"
  - "شوفاژکار"
  - "ایران رادیاتور"
  - "گرم ایران"

# ── عمومی ────────────────────────────────────────
general:
  log_level: "INFO"
  extensions:
    - ".pdf"
    - ".jpg"
    - ".jpeg"
    - ".png"
    - ".webp"
    - ".doc"
    - ".docx"
    - ".xlsx"
