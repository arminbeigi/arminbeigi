# ── شفازح CRM — استقرار کامل با Docker Compose ───────────────────────────────
# سرویس‌ها: postgres ، redis ، api (NestJS) ، web (Next.js) ، nginx (تک‌مبدأ).
# اجرا:   cp .env.example .env  &&  docker compose up -d --build
# سپس:    http://localhost  (یا IP/دامنه‌ی سرور)
#
# هوش مصنوعی (AI) به‌صورت پیش‌فرض روی حالت Mock است و بدون هیچ مدلی کار می‌کند.
# برای فعال‌سازی مدل واقعیِ رایگان روی مک (Ollama با شتاب Metal) به docs/phase-8-deploy.md
# مراجعه کنید — کافی است در .env مقادیر AI_MOCK=false و AI_BASE_URL=... را تنظیم کنید.

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-shofazh}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD لازم است}
      POSTGRES_DB: ${POSTGRES_DB:-shofazh}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-shofazh} -d ${POSTGRES_DB:-shofazh}']
      interval: 5s
      timeout: 5s
      retries: 20
    # پورت فقط برای دسترسی محلی/دیباگ؛ در تولید می‌توان حذف کرد
    ports:
      - '127.0.0.1:5432:5432'

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 20

  # پشتیبان‌گیری دوره‌ای از دیتابیس (pg_dump فشرده + چرخش نگه‌داری).
  # پشتیبان‌ها در volume جداگانه‌ی «backups» و قابل کپی به خارج از سرور‌اند.
  backup:
    image: postgres:16
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGPORT: '5432'
      POSTGRES_USER: ${POSTGRES_USER:-shofazh}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD لازم است}
      POSTGRES_DB: ${POSTGRES_DB:-shofazh}
      BACKUP_DIR: /backups
      BACKUP_INTERVAL: ${BACKUP_INTERVAL:-86400}
      RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
    volumes:
      - ./scripts:/scripts:ro
      - backups:/backups
    entrypoint: ['/bin/sh', '/scripts/backup-loop.sh']

  api:
    build:
      context: ./apps/api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: '4000'
      # connection_limit: اندازه‌ی استخر اتصال Prisma به‌ازای هر اینستنس (پیش‌فرض ۱۰)؛
      # pool_timeout: ثانیه انتظار برای اتصال آزاد؛ connect_timeout: مهلت اتصال اولیه.
      DATABASE_URL: postgresql://${POSTGRES_USER:-shofazh}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-shofazh}?schema=public&connection_limit=${DB_POOL_SIZE:-10}&pool_timeout=20&connect_timeout=10
      REDIS_URL: redis://redis:6379
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET لازم است}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET لازم است}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-900}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-2592000}
      # ── تلفن (Issabel/AMI) — پیش‌فرض شبیه‌ساز ──
      AMI_MOCK: ${AMI_MOCK:-true}
      AMI_HOST: ${AMI_HOST:-127.0.0.1}
      AMI_PORT: ${AMI_PORT:-5038}
      AMI_USERNAME: ${AMI_USERNAME:-crm}
      AMI_SECRET: ${AMI_SECRET:-change-me}
      RECORDING_PUBLIC_BASE: ${RECORDING_PUBLIC_BASE:-/recordings}
      # ── هوش مصنوعی — پیش‌فرض Mock (بدون نیاز به مدل) ──
      AI_MOCK: ${AI_MOCK:-true}
      AI_BASE_URL: ${AI_BASE_URL:-http://ai-inference:8000/v1}
      AI_MODEL: ${AI_MODEL:-qwen2.5-14b-instruct}
      AI_API_KEY: ${AI_API_KEY:-not-needed}
      STT_MOCK: ${STT_MOCK:-true}
      STT_BASE_URL: ${STT_BASE_URL:-http://stt-whisper:9000}
    # دسترسی به سرویس‌های میزبان (مثل Ollama روی مک): host.docker.internal
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    # liveness از طریق Node (تصویر slim بدون curl) — برای سالم‌اعلام‌شدن سرویس
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:4000/api/health/live').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  web:
    build:
      context: ./apps/web
      args:
        # در زمان build در باندل تزریق می‌شود؛ «/api» ⇒ هم‌مبدأ پشت Nginx
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
    restart: unless-stopped
    depends_on:
      - api

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - web
      - api
    ports:
      - '${HTTP_PORT:-80}:80'
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  pgdata:
  redisdata:
  backups:
