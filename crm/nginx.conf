# ── شفازح CRM — Nginx (تک‌مبدأ / reverse proxy) ──────────────────────────────
# همه‌چیز روی یک پورت (۸۰):
#   /          → فرانت Next.js
#   /api       → بک‌اند NestJS (پیشوند سراسری «api»)
#   /socket.io → WebSocket بک‌اند (Socket.IO، با ارتقای اتصال)
#   /recordings→ فایل‌های ضبط تماس (در صورت استفاده)

upstream web_upstream {
  server web:3000;
}
upstream api_upstream {
  server api:4000;
}

server {
  listen 80;
  server_name _;

  # حداکثر حجم بدنه (مثلاً بارگذاری فایل ضبط/پیوست)
  client_max_body_size 25m;

  # ── WebSocket (Socket.IO) ──────────────────────────────────────────────────
  location /socket.io/ {
    proxy_pass http://api_upstream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  # ── API ────────────────────────────────────────────────────────────────────
  location /api/ {
    proxy_pass http://api_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # ── فایل‌های ضبط تماس (اختیاری) ─────────────────────────────────────────────
  location /recordings/ {
    proxy_pass http://api_upstream;
    proxy_set_header Host $host;
  }

  # ── فرانت (Next.js) ─────────────────────────────────────────────────────────
  location / {
    proxy_pass http://web_upstream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
