<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بنر تجهیزات استخری</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;700;900&display=swap');

  .pool-wrap {
    font-family: 'Vazirmatn', Tahoma, sans-serif;
    direction: rtl;
    display: block;
    width: 100%;
    max-width: 760px;
  }
  .pool-wrap * { margin:0; padding:0; box-sizing:border-box; }

  /* ── Banner shell ── */
  .pool-banner {
    position: relative;
    width: 100%;
    height: 260px;
    background: linear-gradient(135deg, #daeef8 0%, #c8e8f5 40%, #b8dff0 70%, #cce9f7 100%);
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 16px 50px rgba(0,120,200,0.22), 0 0 0 1px rgba(255,255,255,0.4);
    cursor: pointer;
  }

  /* ── Background effects ── */
  .pool-glow {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 30% 50%, rgba(100,200,255,0.35) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(0,150,220,0.15) 0%, transparent 50%);
    animation: poolGlow 4s ease-in-out infinite alternate;
  }
  @keyframes poolGlow { from{opacity:0.6} to{opacity:1} }

  .pool-shimmer {
    position: absolute; inset: 0;
    background: linear-gradient(110deg, transparent 30%, rgba(255,255,255,0.22) 50%, transparent 70%);
    background-size: 200% 100%;
    animation: poolShimmer 3s linear infinite;
  }
  @keyframes poolShimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  /* ── Bubbles ── */
  .pool-bubble {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.18);
    border: 1px solid rgba(255,255,255,0.4);
    animation: poolRise linear infinite;
  }
  .pool-bubble:nth-child(1) {width:12px;height:12px;left:6%;  bottom:-20px;animation-duration:5.5s;animation-delay:0s}
  .pool-bubble:nth-child(2) {width:7px; height:7px; left:14%; bottom:-20px;animation-duration:4.2s;animation-delay:1.1s}
  .pool-bubble:nth-child(3) {width:16px;height:16px;left:23%; bottom:-20px;animation-duration:6.8s;animation-delay:0.5s}
  .pool-bubble:nth-child(4) {width:5px; height:5px; left:32%; bottom:-20px;animation-duration:3.9s;animation-delay:2s}
  .pool-bubble:nth-child(5) {width:13px;height:13px;left:42%; bottom:-20px;animation-duration:5.1s;animation-delay:0.8s}
  .pool-bubble:nth-child(6) {width:8px; height:8px; left:55%; bottom:-20px;animation-duration:4.7s;animation-delay:1.6s}
  .pool-bubble:nth-child(7) {width:10px;height:10px;left:68%; bottom:-20px;animation-duration:6.2s;animation-delay:0.3s}
  .pool-bubble:nth-child(8) {width:6px; height:6px; left:80%; bottom:-20px;animation-duration:3.5s;animation-delay:2.4s}
  @keyframes poolRise {
    0%  {transform:translateY(0) translateX(0) scale(1); opacity:0}
    10% {opacity:0.8}
    50% {transform:translateY(-120px) translateX(10px) scale(1.05)}
    90% {opacity:0.3}
    100%{transform:translateY(-240px) translateX(-8px) scale(0.8); opacity:0}
  }

  /* ── Waves ── */
  .pool-waves {
    position:absolute; bottom:0; left:0; right:0; height:44px; overflow:hidden;
  }
  .pool-wave { position:absolute; bottom:0; width:200%; height:44px; }
  .pool-wave svg { width:100%; height:100%; }
  .pool-wave-1 { animation:poolWave 6s linear infinite; opacity:0.3; }
  .pool-wave-2 { animation:poolWave 9s linear infinite reverse; opacity:0.2; bottom:3px; }
  @keyframes poolWave { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }

  /* ── Corner deco ── */
  .pool-corner {
    position:absolute; top:-25px; left:-25px;
    width:100px; height:100px; border-radius:50%;
    border:2px solid rgba(0,150,200,0.2);
    animation:poolCorner 15s linear infinite;
  }
  .pool-corner::after {
    content:''; position:absolute; top:10px; left:10px; right:10px; bottom:10px;
    border-radius:50%; border:1px dashed rgba(0,150,200,0.25);
  }
  @keyframes poolCorner { to{transform:rotate(360deg)} }

  /* ── Main layout ── */
  .pool-inner {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 28px 32px;
    gap: 16px;
    height: 100%;
  }

  /* ── Text ── */
  .pool-text {
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex: 1;
    min-width: 0;
  }

  .pool-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(0,120,200,0.15);
    border: 1px solid rgba(0,120,200,0.3);
    border-radius: 50px; padding: 4px 14px; width: fit-content;
    animation: poolPop 0.6s 0.2s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes poolPop { from{opacity:0;transform:scale(0.5)} to{opacity:1;transform:scale(1)} }
  .pool-badge span { font-size: clamp(10px,1.5vw,12px); color:#0077b6; font-weight:700; }
  .pool-dot {
    width:7px; height:7px; border-radius:50%; background:#0096c7; flex-shrink:0;
    animation:poolDot 1.5s ease-in-out infinite;
  }
  @keyframes poolDot { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.4);opacity:0.7} }

  .pool-title {
    font-size: clamp(20px, 4vw, 30px);
    font-weight: 900;
    color: #023e8a;
    line-height: 1.3;
    text-shadow: 0 2px 8px rgba(0,80,180,0.12);
  }
  .pool-title span {
    color: #0096c7;
    animation: poolColor 3s ease-in-out infinite alternate;
  }
  @keyframes poolColor { from{color:#0096c7} to{color:#023e8a} }

  .pool-sub {
    font-size: clamp(11px, 1.8vw, 14px);
    color: #0077b6; font-weight:500; opacity:0.85;
  }

  .pool-btn {
    text-decoration: none;
    display: inline-flex; align-items: center; gap: 8px;
    background: linear-gradient(135deg, #0096c7, #0077b6);
    color: #fff; border-radius: 50px;
    padding: clamp(8px,1.5vw,10px) clamp(16px,3vw,26px);
    font-size: clamp(12px,1.8vw,15px); font-weight:700;
    font-family: 'Vazirmatn', Tahoma, sans-serif;
    cursor: pointer; width: fit-content;
    box-shadow: 0 6px 20px rgba(0,120,200,0.4);
    transition: all 0.25s ease;
    position: relative; overflow: hidden;
  }
  .pool-btn::before {
    content:''; position:absolute; inset:0;
    background:linear-gradient(135deg,rgba(255,255,255,0.2),transparent);
    opacity:0; transition:opacity 0.25s;
  }
  .pool-btn:hover { transform:translateY(-3px) scale(1.04); }
  .pool-btn:hover::before { opacity:1; }
  .pool-btn-arrow {
    width:20px; height:20px; background:rgba(255,255,255,0.25);
    border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-size:12px; flex-shrink:0;
    animation:poolArrow 1.5s ease-in-out infinite;
  }
  @keyframes poolArrow { 0%,100%{transform:translateX(0)} 50%{transform:translateX(-4px)} }

  /* ── Image side ── */
  .pool-img-side {
    position: relative;
    width: 300px;
    height: 180px;
    flex-shrink: 0;
  }
  .pool-glow-ring {
    position:absolute; top:50%; left:50%;
    transform:translate(-50%,-50%);
    width:180px; height:180px; border-radius:50%;
    background:radial-gradient(circle,rgba(0,180,255,0.2) 0%,transparent 70%);
    animation:poolRing 3s ease-in-out infinite;
  }
  @keyframes poolRing {
    0%,100%{transform:translate(-50%,-50%) scale(1); opacity:0.6}
    50%{transform:translate(-50%,-50%) scale(1.15); opacity:1}
  }
  .pool-product {
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    animation:poolFloat 3.5s ease-in-out infinite;
    filter:drop-shadow(0 12px 24px rgba(0,100,200,0.3));
  }
  .pool-product img { width:100%; height:100%; object-fit:contain; }
  @keyframes poolFloat {
    0%,100%{transform:translateY(0) rotate(-1deg)}
    50%{transform:translateY(-12px) rotate(1deg)}
  }
  .pool-sparkle {
    position:absolute; background:rgba(255,255,255,0.9); border-radius:50%;
    box-shadow:0 0 6px 2px rgba(100,200,255,0.7);
    animation:poolSpark ease-in-out infinite;
  }
  .pool-sparkle:nth-child(1){width:6px;height:6px;top:15%;left:10%;animation-duration:2.1s;animation-delay:0s}
  .pool-sparkle:nth-child(2){width:9px;height:9px;top:65%;left:80%;animation-duration:2.8s;animation-delay:0.6s}
  .pool-sparkle:nth-child(3){width:5px;height:5px;top:35%;left:90%;animation-duration:1.9s;animation-delay:1.2s}
  .pool-sparkle:nth-child(4){width:7px;height:7px;top:80%;left:5%; animation-duration:2.5s;animation-delay:0.4s}
  @keyframes poolSpark {
    0%,100%{transform:scale(0) rotate(0deg); opacity:0}
    40%{transform:scale(1) rotate(45deg); opacity:1}
    70%{transform:scale(0.6) rotate(90deg); opacity:0.6}
  }

  /* ══════════════════════════════
     RESPONSIVE — tablet (≤ 580px)
  ══════════════════════════════ */
  @media (max-width: 580px) {
    .pool-banner { height: auto; border-radius: 14px; }
    .pool-inner {
      flex-direction: column;
      align-items: flex-start;
      padding: 20px 20px 16px;
      height: auto;
    }
    .pool-img-side { width: 100%; height: 130px; order: -1; }
    .pool-glow-ring { width: 120px; height: 120px; }
    .pool-text { gap: 8px; }
  }

  /* ══════════════════════════════
     RESPONSIVE — mobile (≤ 400px)
  ══════════════════════════════ */
  @media (max-width: 400px) {
    .pool-inner { padding: 18px 16px 14px; }
    .pool-img-side { height: 110px; }
    .pool-title { font-size: 19px; }
  }
</style>
</head>
<body>

<div class="pool-wrap">
  <div class="pool-banner">

    <div class="pool-bubble"></div>
    <div class="pool-bubble"></div>
    <div class="pool-bubble"></div>
    <div class="pool-bubble"></div>
    <div class="pool-bubble"></div>
    <div class="pool-bubble"></div>
    <div class="pool-bubble"></div>
    <div class="pool-bubble"></div>

    <div class="pool-glow"></div>
    <div class="pool-shimmer"></div>
    <div class="pool-corner"></div>

    <div class="pool-waves">
      <div class="pool-wave pool-wave-1">
        <svg viewBox="0 0 1200 44" preserveAspectRatio="none">
          <path d="M0,24 C200,4 400,44 600,24 C800,4 1000,44 1200,24 L1200,44 L0,44 Z" fill="rgba(0,120,200,0.12)"/>
        </svg>
      </div>
      <div class="pool-wave pool-wave-2">
        <svg viewBox="0 0 1200 44" preserveAspectRatio="none">
          <path d="M0,32 C300,8 600,44 900,20 C1050,8 1150,32 1200,24 L1200,44 L0,44 Z" fill="rgba(0,150,220,0.1)"/>
        </svg>
      </div>
    </div>

    <div class="pool-inner">
      <!-- Text -->
      <div class="pool-text">
        <div class="pool-badge">
          <div class="pool-dot"></div>
          <span>تجهیزات تخصصی</span>
        </div>
        <h2 class="pool-title">
          <span>صفر تا صد</span><br>
          تجهیزات استخری
        </h2>
        <p class="pool-sub">کامل‌ترین مجموعه محصولات استخر</p>
        <a href="https://shofazh.com/product-category/pool/" class="pool-btn">
          <div class="pool-btn-arrow">←</div>
          خرید کنید
        </a>
      </div>

      <!-- Image -->
      <div class="pool-img-side">
        <div class="pool-glow-ring"></div>
        <div class="pool-sparkle"></div>
        <div class="pool-sparkle"></div>
        <div class="pool-sparkle"></div>
        <div class="pool-sparkle"></div>
        <div class="pool-product">
          <img src="https://shofazh.com/wp-content/uploads/pool-equipment.png"
               onerror="this.onerror=null; this.parentElement.innerHTML=poolSVG()"
               alt="تجهیزات استخری">
        </div>
      </div>
    </div>

  </div>
</div>

</script>

</body>
</html>
