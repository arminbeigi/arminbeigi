📋 *جزئیات*
   • تاریخ: """ + datetime.now().strftime("%Y-%m-%d %H:%M") + """
   • Logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

🔍 *توصیه بعدی*
   1. Google Search Console را نظارت کنید
   2. 7-14 روز منتظر بمانید
   3. Position و CTR بهبود را ببینید
   4. کلیک‌های نو را تائید کنید

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          """

          url = f"https://api.telegram.org/bot{TOKEN}/sendMessage"
          payload = {
              "chat_id": CHAT_ID,
              "text": message,
              "parse_mode": "Markdown"
          }

          requests.post(url, json=payload, timeout=10)
          TELEGRAM_SCRIPT

      - name: Send Telegram Notification (Failure)
        if: failure()
        run: |
          python3 << 'TELEGRAM_SCRIPT'
          import requests

          TOKEN = "${{ secrets.TELEGRAM_TOKEN }}"
          CHAT_ID = "${{ secrets.TELEGRAM_CHAT_ID }}"

          message = """
          ❌ GSC Auto-Fixer — Error Report

          📊 Status: FAILED

          ⚠️ Something went wrong during execution

          🔍 Check logs for details:
          ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          """

          url = f"https://api.telegram.org/bot{TOKEN}/sendMessage"
          payload = {
              "chat_id": CHAT_ID,
              "text": message,
              "parse_mode": "Markdown"
          }

          requests.post(url, json=payload, timeout=10)
          TELEGRAM_SCRIPT
