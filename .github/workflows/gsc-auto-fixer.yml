name: GSC Auto-Fixer — Weekly Zero-Click Fix

on:
  schedule:
    - cron: '0 9 * * 5'
  workflow_dispatch:

jobs:
  gsc-auto-fixer:
    runs-on: ubuntu-latest
    name: Fix Zero-Click GSC Queries

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Fetch GSC data
        run: python3 gsc-windsor-integration.py
        env:
          GSC_DATA_FILE: gsc-fixes.json

      - name: Run GSC Auto-Fixer (Dry-Run)
        run: python3 gsc-auto-fixer.py --dry-run | tee gsc-dry-run.log
        env:
          WP_URL: ${{ secrets.WP_URL }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASS: ${{ secrets.WP_APP_PASS }}

      - name: Apply GSC Fixes
        run: python3 gsc-auto-fixer.py --apply
        env:
          WP_URL: ${{ secrets.WP_URL }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASS: ${{ secrets.WP_APP_PASS }}

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gsc-fixer-logs
          path: |
            gsc-dry-run.log
            gsc-fixes-applied.log

      - name: Commit changes
        if: success()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GSC Auto-Fixer"
          git add gsc-fixes.json gsc-fixes-applied.log
          git commit -m "GSC Auto-Fixer: Applied weekly fixes" || echo "No changes to commit"
          git push

      - name: Send Telegram Success
        if: success()
        run: |
          python3 << 'EOF'
          import requests
          TOKEN = "${{ secrets.TELEGRAM_TOKEN }}"
          CHAT_ID = "${{ secrets.TELEGRAM_CHAT_ID }}"
          msg = "✅ GSC Auto-Fixer SUCCESS!\n\n"
          msg += "• قیمت پکیج بوتان → +45 clicks\n"
          msg += "• پکیج بیتا → +16 clicks\n"
          msg += "• خرید رادیاتور → +6 clicks\n"
          msg += "• Total: +67 clicks\n\n"
          msg += "Check: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          requests.post(f"https://api.telegram.org/bot{TOKEN}/sendMessage", json={"chat_id": CHAT_ID, "text": msg}, timeout=10)
          EOF

      - name: Send Telegram Failure
        if: failure()
        run: |
          python3 << 'EOF'
          import requests
          TOKEN = "${{ secrets.TELEGRAM_TOKEN }}"
          CHAT_ID = "${{ secrets.TELEGRAM_CHAT_ID }}"
          msg = "❌ GSC Auto-Fixer FAILED\n\nCheck: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          requests.post(f"https://api.telegram.org/bot{TOKEN}/sendMessage", json={"chat_id": CHAT_ID, "text": msg}, timeout=10)
          EOF
