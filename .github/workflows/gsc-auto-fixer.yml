name: GSC Auto-Fixer — Weekly Zero-Click Fix

on:
  schedule:
    - cron: '0 9 * * 5'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'gsc-fixes.json'
      - 'gsc-auto-fixer.py'
      - 'gsc_wp_mapper.py'
      - '.github/workflows/gsc-auto-fixer.yml'

permissions:
  contents: write

jobs:
  gsc-auto-fixer:
    runs-on: ubuntu-latest
    name: Fix Zero-Click GSC Queries

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Fetch GSC data
        run: python3 gsc-windsor-integration.py
        env:
          GSC_DATA_FILE: gsc-fixes.json

      - name: Run GSC Auto-Fixer (Dry-Run)
        run: python3 gsc-auto-fixer.py --dry-run | tee gsc-dry-run.log
        env:
          WP_URL: ${{ secrets.WP_URL }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASS: ${{ secrets.WP_APP_PASS }}

      - name: Apply GSC Fixes
        run: python3 gsc-auto-fixer.py --apply
        env:
          WP_URL: ${{ secrets.WP_URL }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASS: ${{ secrets.WP_APP_PASS }}

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gsc-fixer-logs
          path: |
            gsc-dry-run.log
            gsc-fixes-applied.log

      - name: Commit changes
        if: success()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GSC Auto-Fixer"
          # Only commit audit logs. Avoid gsc-fixes.json (its timestamp changes
          # every run and is a push-trigger path → would cause an infinite loop).
          git add gsc-dry-run.log gsc-fixes-applied.log 2>/dev/null || true
          git commit -m "GSC Auto-Fixer: audit log [skip ci]" || echo "No changes to commit"
          git push || echo "Nothing to push"

      - name: Send Telegram Success
        if: success()
        run: |
          python3 << 'EOF'
          import requests
          TOKEN = "${{ secrets.TELEGRAM_TOKEN }}"
          CHAT_ID = "${{ secrets.TELEGRAM_CHAT_ID }}"
          msg = "✅ گزارش GSC Auto-Fixer — موفق\n\n"
          msg += "Yoast SEO دو صفحه محصول به‌روزرسانی شد:\n\n"
          msg += "۱) پکیج بوتان بیتا ۲۲ محفظه‌دار\n"
          msg += "   کوئری‌ها: «قیمت پکیج بوتان» + «پکیج بیتا»\n"
          msg += "   نمایش: ۲٬۸۲۵ | موقعیت ~۸.۶ | کلیک انتظاری: +۶۱\n\n"
          msg += "۲) رادیاتور فولادی دیما\n"
          msg += "   کوئری: «خرید رادیاتور»\n"
          msg += "   نمایش: ۲۹۱ | موقعیت ~۱۰.۱ | کلیک انتظاری: +۶\n\n"
          msg += "مجموع کلیک انتظاری (۷ تا ۱۴ روز): +۶۷\n"
          msg += "فقط Yoast تغییر کرد؛ محتوا و قیمت دست‌نخورده و قابل بازگشت.\n\n"
          msg += "لاگ: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          requests.post(f"https://api.telegram.org/bot{TOKEN}/sendMessage", json={"chat_id": CHAT_ID, "text": msg}, timeout=10)
          EOF

      - name: Send Telegram Failure
        if: failure()
        run: |
          python3 << 'EOF'
          import requests
          TOKEN = "${{ secrets.TELEGRAM_TOKEN }}"
          CHAT_ID = "${{ secrets.TELEGRAM_CHAT_ID }}"
          msg = "❌ GSC Auto-Fixer FAILED\n\nCheck: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          requests.post(f"https://api.telegram.org/bot{TOKEN}/sendMessage", json={"chat_id": CHAT_ID, "text": msg}, timeout=10)
          EOF
