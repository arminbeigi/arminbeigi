name: Run strip-rating (preview + apply)

# Fires when the trigger file below changes on main (e.g. via a merged PR).
# Removes the fabricated AggregateRating JSON-LD from live product content.
# Logs a dry-run preview first, then applies. Safe to delete after use.

on:
  push:
    branches: [main]
    paths:
      - 'seo-fixes/.trigger-strip-rating'

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Preview then apply strip-rating to all products
        env:
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASS: ${{ secrets.WP_APP_PASS }}
        run: |
          echo "================= DRY-RUN PREVIEW ================="
          python seo-fixes/wp_seo_fixes.py --task strip-rating --limit 0
          echo "================= APPLYING ======================="
          python seo-fixes/wp_seo_fixes.py --task strip-rating --limit 0 --apply
