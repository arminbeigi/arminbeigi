name: SEO diagnostic (read-only)

# Read-only: probes the SEO title config and lists trashed products.
# Makes NO changes. Fires when the trigger file changes; safe to delete after.

on:
  push:
    branches: [main]
    paths:
      - 'seo-fixes/.trigger-diagnostic'

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Probe titles + list trashed (no writes)
        env:
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASS: ${{ secrets.WP_APP_PASS }}
        run: |
          echo "================= PROBE TITLES (read-only) ================="
          python seo-fixes/wp_seo_fixes.py --task probe-titles
          echo "================= TRASHED PRODUCTS (dry-run) ================="
          python seo-fixes/wp_seo_fixes.py --task delete-trashed
